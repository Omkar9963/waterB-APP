<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rainfall-Runoff DSS logo">
  <defs>
    <linearGradient id="drop" x1="30" y1="12" x2="92" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22B8C4"/>
      <stop offset="0.55" stop-color="#0E7C86"/>
      <stop offset="1" stop-color="#0B4F6C"/>
    </linearGradient>
    <clipPath id="dclip">
      <path d="M60 8 C60 8 96 50 96 78 A36 36 0 1 1 24 78 C24 50 60 8 60 8 Z"/>
    </clipPath>
  </defs>

  <!-- droplet body -->
  <path d="M60 8 C60 8 96 50 96 78 A36 36 0 1 1 24 78 C24 50 60 8 60 8 Z" fill="url(#drop)"/>

  <!-- terrain contour lines + hydrograph, clipped inside the drop -->
  <g clip-path="url(#dclip)" stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="2.4" fill="none" stroke-linecap="round">
    <path d="M18 86 C34 78 44 92 60 86 C76 80 88 92 104 84" stroke-opacity="0.30"/>
    <path d="M18 74 C34 66 44 80 60 74 C76 68 88 80 104 72" stroke-opacity="0.45"/>
    <path d="M18 62 C34 54 44 68 60 62 C76 56 88 68 104 60" stroke-opacity="0.60"/>
    <!-- hydrograph spike -->
    <path d="M26 66 L42 66 L52 44 L62 70 L72 56 L96 56" stroke-width="3" stroke-opacity="0.95"/>
  </g>
</svg>
